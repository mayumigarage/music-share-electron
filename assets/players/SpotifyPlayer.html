<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spotify Player</title>
  <style>
    html, body { margin: 0; padding: 0; background: #000; overflow: hidden; width: 100%; height: 100%; }
    #status { color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <div id="status">Spotify Player initializing...</div>
  <!--
    Fallback note (Phase 5.8):
    The Spotify Web Playback SDK is loaded from https://sdk.scdn.co.
    file:// origins can load the SDK, but playback requires a valid OAuth token.
    If the SDK refuses to initialize from file://, serve this HTML via a local
    static server or a custom protocol (e.g., app://players/). In Phase 1,
    the token is intentionally empty; playback will not work until auth is wired.
  -->
  <script>
    let player = null;
    let deviceId = null;
    let currentTrackUri = null;
    let reportInterval = null;
    let currentDuration = 0;
    let isPlaying = false;
    let spotifyToken = '';
    let previousToken = '';
    let endedSent = false;
    let trackChangeIgnoreUntil = 0;

    // Device readiness promise so playTrack can wait for device_id instead of failing immediately.
    let deviceReadyResolve = null;
    let deviceReadyReject = null;
    let deviceReadyPromise = null;
    function resetDeviceReadyPromise() {
      deviceReadyPromise = new Promise((resolve, reject) => {
        deviceReadyResolve = resolve;
        deviceReadyReject = reject;
      });
    }
    resetDeviceReadyPromise();

    /** Send a structured message to Main via the player preload bridge. */
    function send(msg) {
      if (window.electronPlayerAPI && window.electronPlayerAPI.sendMessage) {
        window.electronPlayerAPI.sendMessage(msg);
      }
    }

    /** Receive token updates from Main via player preload. */
    if (window.electronPlayerAPI && window.electronPlayerAPI.onSpotifyToken) {
      window.electronPlayerAPI.onSpotifyToken((token) => {
        const newToken = token || '';
        spotifyToken = newToken;
        // Only reconnect if the player hasn't established a device yet (e.g. after
        // an auth error or during initial load). Reconnecting while playing would
        // interrupt playback, so we avoid it when a device is already active.
        if (newToken && player && newToken !== previousToken && !deviceId) {
          previousToken = newToken;
          player.disconnect().then(() => player.connect()).then(() => {
            if (deviceId) activateDevice(deviceId);
          });
        } else if (newToken && player && newToken !== previousToken && deviceId) {
          // Token refreshed while player is active; re-activate to keep device alive
          previousToken = newToken;
          activateDevice(deviceId, false, newToken);
        } else {
          previousToken = newToken;
        }
      });
    }

    /**
     * Activate this Web Playback SDK device so the Web API can control it.
     * Retries up to 3 times with exponential backoff (500ms, 1s, 2s).
     * Returns true if activation succeeded, false otherwise.
     */
    async function activateDevice(id, shouldPlay = false, token = null) {
      const authToken = token || spotifyToken;
      if (!authToken) return false;

      const delays = [500, 1000, 2000];
      for (let attempt = 0; attempt < delays.length; attempt++) {
        try {
          const response = await fetch('https://api.spotify.com/v1/me/player', {
            method: 'PUT',
            headers: {
              'Authorization': `Bearer ${authToken}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ device_ids: [id], play: shouldPlay }),
          });
          // 204 = success, 202 = accepted (no active device state yet)
          if (response.status === 204 || response.status === 202 || response.ok) {
            return true;
          }
          // On last attempt, propagate the failure
          if (attempt === delays.length - 1) {
            return false;
          }
        } catch {
          if (attempt === delays.length - 1) {
            return false;
          }
        }
        await new Promise((r) => setTimeout(r, delays[attempt]));
      }
      return false;
    }

    /**
     * Reconnect player and re-activate device to recover from error states.
     * Waits for the 'ready' event (device_id) before returning.
     */
    async function reconnectDevice() {
      if (!player) return false;
      try {
        // Reset the promise so we can wait for a fresh device_id
        resetDeviceReadyPromise();
        await player.disconnect();
        const success = await player.connect();
        if (!success) {
          return false;
        }
        // Wait up to 10 seconds for the ready event to provide a new device_id
        await Promise.race([
          deviceReadyPromise,
          new Promise((_, reject) => setTimeout(() => reject(new Error('reconnect_timeout')), 10000)),
        ]);
        if (deviceId) {
          await activateDevice(deviceId);
          return true;
        }
        return false;
      } catch {
        return false;
      }
    }

    /**
     * Called by the Spotify SDK once it has loaded.
     *
     * IMPORTANT: This callback MUST be defined BEFORE the SDK <script> tag.
     * If defined after, the SDK may execute before the callback exists,
     * causing a race condition that leads to initialization_error.
     */
    window.onSpotifyWebPlaybackSDKReady = async () => {
      // Proactively fetch the token before creating the player.
      // The token may have been broadcast via IPC before the page's
      // onSpotifyToken listener was attached, so we must also request
      // it explicitly here to avoid connecting with an empty token.
      if (window.electronPlayerAPI && window.electronPlayerAPI.getSpotifyToken) {
        try {
          const token = await window.electronPlayerAPI.getSpotifyToken();
          if (token) spotifyToken = token;
        } catch {
          // ignore
        }
      }

      player = new Spotify.Player({
        name: 'MusicShare Player',
        getOAuthToken: async (cb) => {
          // Always fetch a valid token from Main so the SDK never gets a stale one.
          let token = spotifyToken;
          if (window.electronPlayerAPI && window.electronPlayerAPI.getSpotifyToken) {
            try {
              const fresh = await window.electronPlayerAPI.getSpotifyToken();
              if (fresh) token = fresh;
            } catch {
              // ignore
            }
          }
          cb(token);
        },
        volume: 0.5,
      });

      player.addListener('ready', async ({ device_id }) => {
        deviceId = device_id;
        if (deviceReadyResolve) {
          deviceReadyResolve();
          deviceReadyResolve = null;
          deviceReadyReject = null;
        }
        send({ type: 'ready' });
        document.getElementById('status').textContent = 'Spotify Ready (authentication required for playback)';
        await activateDevice(device_id);
      });

      player.addListener('not_ready', ({ device_id }) => {
        deviceId = null;
        // Reset the promise so subsequent playTrack calls wait for reconnection
        resetDeviceReadyPromise();
      });

      player.addListener('player_state_changed', (state) => {
        if (!state) return;

        const currentTrack = state.track_window?.current_track;
        const currentUri = currentTrack ? currentTrack.uri : null;

        // Detect Spotify auto-queue advancement (ignore during the 3s grace period after load)
        if (currentTrackUri && currentUri && currentUri !== currentTrackUri && Date.now() > trackChangeIgnoreUntil) {
          // Spotify started playing a different track from its internal queue.
          // Pause it and let the app handle loading the next queued track.
          player.pause();
          if (!endedSent) {
            endedSent = true;
            send({ type: 'ended' });
            stopReportInterval();
          }
          return;
        }

        isPlaying = !state.paused;
        const currentTime = state.position / 1000;
        currentDuration = state.duration / 1000;

        const trackInfo = currentTrack ? {
          title: currentTrack.name,
          artist: currentTrack.artists.map((a) => a.name).join(', '),
          thumbnailUrl: currentTrack.album?.images?.[0]?.url || '',
        } : null;

        send({ type: 'state', isPlaying, currentTime, duration: currentDuration, trackInfo });

        if (isPlaying) {
          startReportInterval();
          send({ type: 'playing' });
        } else {
          stopReportInterval();
          send({ type: 'paused' });
        }
      });

      player.addListener('initialization_error', ({ message }) => {
        send({ type: 'error', error: 'init|' + message });
        document.getElementById('status').textContent = 'Spotify Init Error: ' + message;
      });

      player.addListener('authentication_error', async ({ message }) => {
        send({ type: 'error', error: 'auth|' + message });
        document.getElementById('status').textContent = 'Spotify Auth Error: ' + message;
        // Try to recover by fetching a fresh token and reconnecting
        if (window.electronPlayerAPI && window.electronPlayerAPI.getSpotifyToken) {
          try {
            const fresh = await window.electronPlayerAPI.getSpotifyToken();
            if (fresh) {
              spotifyToken = fresh;
              previousToken = fresh;
              await reconnectDevice();
            }
          } catch {
            // ignore recovery errors
          }
        }
      });

      player.addListener('account_error', ({ message }) => {
        send({ type: 'error', error: 'account|' + message });
      });

      player.addListener('playback_error', ({ message }) => {
        send({ type: 'error', error: 'playback|' + message });
      });

      player.connect().then((success) => {
        if (!success) {
          send({ type: 'error', error: 'connect_failed' });
          document.getElementById('status').textContent = 'Spotify connection failed';
        }
      });
    };

    function reportTimeUpdate() {
      if (!player || endedSent) return;
      player.getCurrentState().then((state) => {
        if (!state) return;
        const positionSec = state.position / 1000;
        const durationSec = state.duration / 1000;
        send({ type: 'timeUpdate', currentTimeSeconds: positionSec });

        // Detect track end for services that don't emit 'ended' (Spotify).
        // Require at least 3 seconds of playback to avoid false detection at start.
        if (!endedSent && durationSec > 0 && positionSec >= durationSec - 0.3 && positionSec > 3) {
          endedSent = true;
          send({ type: 'ended' });
          stopReportInterval();
        }
      }).catch(() => {
        // ignore
      });
    }

    function startReportInterval() {
      stopReportInterval();
      reportInterval = setInterval(reportTimeUpdate, 250);
    }

    function stopReportInterval() {
      if (reportInterval) {
        clearInterval(reportInterval);
        reportInterval = null;
      }
    }

    // ========================================================================
    // Global API invoked by Main process via executeJavaScript
    // ========================================================================

    async function playTrack(url) {
      endedSent = false;
      trackChangeIgnoreUntil = Date.now() + 3000; // ignore auto-advance detection for 3s after load
      let uri = url;
      if (url.includes('open.spotify.com')) {
        const match = url.match(/track\/([a-zA-Z0-9]+)/);
        if (match) uri = 'spotify:track:' + match[1];
      }
      currentTrackUri = uri;

      // Ensure we have a valid token before calling the Web API
      let token = spotifyToken;
      if (window.electronPlayerAPI && window.electronPlayerAPI.getSpotifyToken) {
        try {
          const fresh = await window.electronPlayerAPI.getSpotifyToken();
          if (fresh) {
            token = fresh;
            spotifyToken = fresh;
          }
        } catch {
          // ignore
        }
      }

      if (!token) {
        send({ type: 'error', error: 'auth_required|Spotify playback requires authentication' });
        return;
      }

      // If no deviceId yet, wait up to 10s for the player to become ready.
      if (!deviceId) {
        try {
          await Promise.race([
            deviceReadyPromise,
            new Promise((_, reject) => setTimeout(() => reject(new Error('device_ready_timeout')), 10000)),
          ]);
        } catch {
          send({ type: 'error', error: 'no_device|Spotify player not ready' });
          return;
        }
      }

      if (!deviceId) {
        send({ type: 'error', error: 'no_device|Spotify player not ready' });
        return;
      }

      // Attempt playback with retry logic for recoverable errors.
      // Spotify Web API automatically activates the device when device_id is
      // passed to the /play endpoint, so we call play directly and only fall
      // back to explicit activation on 404 (device not yet ready).
      const maxRetries = 2;
      for (let attempt = 0; attempt <= maxRetries; attempt++) {
        try {
          const response = await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`, {
            method: 'PUT',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ uris: [uri], context_uri: null }),
          });

          if (!response.ok) {
            const data = await response.json().catch(() => null);
            const msg = data?.error?.message || `HTTP ${response.status}`;
            // Provide a clearer message for common errors
            let friendly = msg;
            if (response.status === 403) {
              friendly = 'Spotify playback requires a Premium account (HTTP 403)';
            } else if (response.status === 404) {
              friendly = 'No active Spotify device found (HTTP 404). Retrying...';
            } else if (response.status === 401) {
              friendly = 'Spotify token expired or invalid (HTTP 401)';
            }
            throw new Error(friendly);
          }

          send({ type: 'loaded', uri });
          return; // Success — exit the retry loop
        } catch (err) {
          const isLastAttempt = attempt >= maxRetries;
          const errMsg = err.message || String(err);

          // Classify the error
          const isNoDevice = errMsg.includes('404') || errMsg.includes('No active') || errMsg.includes('no_device');
          const isAuth = errMsg.includes('401') || errMsg.includes('token expired') || errMsg.includes('authentication');
          const isPremium = errMsg.includes('403') || errMsg.includes('Premium');

          if (isPremium) {
            send({ type: 'error', error: 'playback|' + errMsg });
            return;
          }

          if (isAuth) {
            send({ type: 'error', error: 'auth_required|' + errMsg });
            return;
          }

          if (isNoDevice && !isLastAttempt) {
            // Try to recover by explicitly activating or reconnecting the device
            send({ type: 'warning', warning: 'Spotify device not active, attempting activation...' });
            let recovered = false;
            if (deviceId) {
              recovered = await activateDevice(deviceId, false, token);
            }
            if (!recovered) {
              const reconnected = await reconnectDevice();
              if (!reconnected) {
                send({ type: 'error', error: 'no_device|Spotify device reconnection failed' });
                return;
              }
            }
            // Loop will retry with the (possibly new) deviceId
            continue;
          }

          if (isLastAttempt) {
            send({ type: 'error', error: 'playback|' + errMsg });
            return;
          }

          // For other transient errors on non-last attempt, wait briefly and retry
          send({ type: 'warning', warning: 'Spotify playback failed, retrying... (' + errMsg + ')' });
          await new Promise((r) => setTimeout(r, 1000));
        }
      }
    }

    function pause() {
      if (!player) return;
      player.getCurrentState().then((state) => {
        if (state && state.track_window && state.track_window.current_track) {
          player.pause();
        }
      }).catch(() => {
        // ignore
      });
    }

    async function resume() {
      if (!player) return;

      // If the device is not ready, attempt to reconnect first.
      if (!deviceId) {
        const reconnected = await reconnectDevice();
        if (!reconnected) return;
      }

      // Ensure the device is still active before resuming; Spotify may have
      // deactivated it during a pause or after an error.
      if (deviceId && spotifyToken) {
        await activateDevice(deviceId, false, spotifyToken);
      }

      player.getCurrentState().then((state) => {
        if (state && state.track_window && state.track_window.current_track) {
          player.resume();
        }
      }).catch(() => {
        // ignore
      });
    }

    function stop() {
      if (player) {
        player.getCurrentState().then((state) => {
          if (state && state.track_window && state.track_window.current_track) {
            player.pause();
          }
        }).catch(() => {
          // ignore
        });
      }
      stopReportInterval();
      isPlaying = false;
      currentDuration = 0;
      endedSent = false;
      currentTrackUri = null;
      send({ type: 'stopped' });
    }

    function seek(seconds) {
      if (player) player.seek(seconds * 1000);
    }

    function setVolume(volume) {
      if (player) player.setVolume(volume);
    }

    /** Service-specific cleanup invoked by Main before destroying the WebContentsView. */
    function cleanupPlayer() {
      if (player && typeof player.disconnect === 'function') {
        player.disconnect();
      }
    }
  </script>
  <!--
    Load the Spotify Web Playback SDK AFTER the ready callback is defined.
    Defining the callback before the script prevents the SDK from missing it
    when the script executes, which avoids the "Failed to initialize player" error.
  -->
  <script src="https://sdk.scdn.co/spotify-player.js"></script>
</body>
</html>
