<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Player</title>
  <style>
    html, body { margin: 0; padding: 0; background: #000; overflow: hidden; width: 100%; height: 100%; }
    #player { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="player"></div>
  <!--
    Fallback note (Phase 5.8):
    YouTube IFrame Player API works from file:// origins for embedding.
    If restrictions appear, serve assets via a local static server or
    register a custom protocol (e.g., app://players/).
  -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player = null;
    let currentVideoId = null;
    let reportInterval = null;
    let currentDuration = 0;

    /** Send a structured message to Main via the player preload bridge. */
    function send(msg) {
      if (window.electronPlayerAPI && window.electronPlayerAPI.sendMessage) {
        window.electronPlayerAPI.sendMessage(msg);
      }
    }

    let isPlayerReady = false;
    let pendingVideoId = null;

    /** Called automatically when the YouTube IFrame API script loads. */
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        width: '100%',
        height: '100%',
        playerVars: {
          autoplay: 1,
          controls: 1,
          rel: 0,
          modestbranding: 1,
          enablejsapi: 1,
          origin: window.location.origin,
        },
        events: {
          onReady: () => {
            isPlayerReady = true;
            send({ type: 'ready' });
            if (pendingVideoId) {
              player.loadVideoById(pendingVideoId);
              pendingVideoId = null;
            }
          },
          onStateChange: onPlayerStateChange,
          onError: onPlayerError,
        },
      });
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) {
        stopReportInterval();
        send({ type: 'ended' });
        return;
      }

      if (event.data === YT.PlayerState.PLAYING) {
        updateDuration();
        startReportInterval();
        send({ type: 'playing' });
      } else if (event.data === YT.PlayerState.PAUSED) {
        stopReportInterval();
        send({ type: 'paused' });
      }

      reportState();
    }

    function onPlayerError(event) {
      const videoId = currentVideoId || 'unknown';
      send({ type: 'error', error: 'VIDEO_ID|' + videoId + '|CODE|' + event.data });
    }

    function updateDuration() {
      if (player && typeof player.getDuration === 'function') {
        const d = player.getDuration();
        if (d && d > 0) currentDuration = d;
      }
    }

    function reportState() {
      if (!player || typeof player.getCurrentTime !== 'function') return;
      const state = player.getPlayerState();
      const isPlaying = state === YT.PlayerState.PLAYING;
      const currentTime = player.getCurrentTime() || 0;
      send({ type: 'state', isPlaying, currentTime, duration: currentDuration });
    }

    function reportTimeUpdate() {
      if (!player || typeof player.getCurrentTime !== 'function') return;
      const currentTime = player.getCurrentTime() || 0;
      send({ type: 'timeUpdate', currentTimeSeconds: currentTime });
    }

    function startReportInterval() {
      stopReportInterval();
      reportInterval = setInterval(() => {
        reportState();
        reportTimeUpdate();
      }, 250);
    }

    function stopReportInterval() {
      if (reportInterval) {
        clearInterval(reportInterval);
        reportInterval = null;
      }
    }

    // ========================================================================
    // Global API invoked by Main process via executeJavaScript
    // ========================================================================

    function playTrack(url) {
      const videoId = extractVideoId(url);
      if (!videoId) {
        send({ type: 'error', error: 'invalid_url|' + url });
        return;
      }
      currentVideoId = videoId;
      if (!isPlayerReady || !player || typeof player.loadVideoById !== 'function') {
        pendingVideoId = videoId;
        return;
      }
      try {
        player.loadVideoById(videoId);
      } catch (e) {
        send({ type: 'error', error: 'load_failed|' + videoId + '|' + (e && e.message) });
      }
    }

    function pause() {
      if (player && typeof player.pauseVideo === 'function') {
        player.pauseVideo();
      }
    }

    function resume() {
      if (player && typeof player.playVideo === 'function') {
        player.playVideo();
      }
    }

    function stop() {
      if (player && typeof player.stopVideo === 'function') {
        player.stopVideo();
      }
      stopReportInterval();
      currentVideoId = null;
      currentDuration = 0;
    }

    function seek(seconds) {
      if (player && typeof player.seekTo === 'function') {
        player.seekTo(seconds, true);
      }
    }

    function setVolume(volume) {
      // volume is expected in range 0.0 – 1.0
      if (player && typeof player.setVolume === 'function') {
        player.setVolume(Math.round(volume * 100));
      }
    }

    /** Service-specific cleanup invoked by Main before destroying the WebContentsView. */
    function cleanupPlayer() {
      if (player && typeof player.destroy === 'function') {
        try {
          player.destroy();
        } catch {
          // ignore
        }
      }
      player = null;
    }

    function extractVideoId(url) {
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtube\.com\/embed\/|youtu\.be\/|youtube\.com\/shorts\/|music\.youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/,
        /^([a-zA-Z0-9_-]{11})$/,
      ];
      for (const p of patterns) {
        const m = url.match(p);
        if (m) return m[1];
      }
      return null;
    }
  </script>
</body>
</html>
