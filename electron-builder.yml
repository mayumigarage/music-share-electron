appId: com.example.musicshare
productName: MusicShare
directories:
  output: release
files:
  - dist/main/**/*
  - dist/renderer/**/*
extraResources:
  - from: cookies.txt
    to: cookies.txt

# CastLabs 製 Electron フォークのバイナリを直接使用（公式ミラーには存在しないバージョンのため）
electronDist: ./node_modules/electron/dist

# バージョン文字列に "+wvcus" が含まれるため、winCodeSign/rcedit のダウンロードが失敗するのを回避
win:
  extraResources:
    - from: tools/yt-dlp.exe
      to: tools/yt-dlp.exe
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  identity: null          # コード署名を無効化（ローカルビルド用）
  category: public.app-category.music
  darkModeSupport: true
