<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MusicShare</title>
  <style>
    :root {
      --bg-primary: #071014;
      --bg-secondary: rgba(255, 255, 255, 0.065);
      --bg-tertiary: rgba(255, 255, 255, 0.09);
      --bg-hover: rgba(255, 255, 255, 0.13);
      --text-primary: #ffffff;
      --text-secondary: rgba(235, 244, 246, 0.72);
      --text-muted: rgba(235, 244, 246, 0.43);
      --accent: #20d875;
      --accent-hover: #35e987;
      --danger: #ff6475;
      --border: rgba(255, 255, 255, 0.12);
      --border-soft: rgba(255, 255, 255, 0.08);
      --glass-panel: rgba(255, 255, 255, 0.055);
      --glass-panel-strong: rgba(255, 255, 255, 0.085);
      --glass-card: rgba(255, 255, 255, 0.075);
      --glass-card-hover: rgba(255, 255, 255, 0.105);
      --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.28);
      --shadow-card: 0 10px 28px rgba(0, 0, 0, 0.22);
      --radius-button: 8px;
      --radius-input: 10px;
      --radius-track: 14px;
      --radius-playlist: 16px;
      --transition-ui: 180ms ease;
      --panel-left-width: 240px;
      --panel-right-width: 280px;
      --control-height: 80px;
      --topbar-height: 64px;
      --room-section-height: 230px;
      --members-panel-height: 140px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background:
        radial-gradient(circle at 14% 6%, rgba(32, 216, 117, 0.13), transparent 25%),
        radial-gradient(circle at 80% 18%, rgba(68, 132, 255, 0.15), transparent 32%),
        linear-gradient(135deg, #071014 0%, #0c1722 48%, #11151d 100%);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      user-select: none;
    }

    .hero-icon {
      display: block;
      flex: 0 0 auto;
      stroke-width: 1.8;
    }

    .hero-icon-16 { width: 16px; height: 16px; }
    .hero-icon-18 { width: 18px; height: 18px; }
    .hero-icon-20 { width: 20px; height: 20px; }
    .hero-icon-24 { width: 24px; height: 24px; }

    .icon-text {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn .hero-icon,
    .tab .hero-icon,
    .brand .hero-icon,
    .members-header .hero-icon,
    .panel-title .hero-icon,
    .modal-header .hero-icon {
      display: inline-block;
      vertical-align: -3px;
    }

    /* ── Top Bar ── */
    #top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--topbar-height);
      background: rgba(8, 18, 25, 0.72);
      backdrop-filter: blur(24px) saturate(150%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 18px;
      z-index: 100;
    }

    #top-bar .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
      letter-spacing: 0.01em;
    }

    .sidebar-toggle {
      width: 28px;
      height: 28px;
      padding: 0;
      font-size: 16px;
    }

    #top-bar .room-info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--text-secondary);
      margin-left: auto;
    }

    /* Room information lives at the top of the right sidebar. */
    #top-bar .room-info { display: none !important; }

    #top-bar .room-info .room-id {
      font-family: 'SFMono-Regular', Consolas, monospace;
      background: var(--bg-tertiary);
      padding: 2px 8px;
      border-radius: 4px;
      color: var(--text-primary);
    }

    #top-bar .top-actions {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }

    .workspace-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .workspace-switch {
      display: inline-flex;
      align-items: center;
      padding: 3px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-input);
      background: rgba(255, 255, 255, 0.055);
      backdrop-filter: blur(18px) saturate(140%);
    }

    .workspace-switch button {
      border: 0;
      border-radius: 8px;
      padding: 7px 11px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      white-space: nowrap;
      transition: background var(--transition-ui), color var(--transition-ui), transform var(--transition-ui);
    }

    .workspace-switch button:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.07);
    }

    .workspace-switch button.active {
      color: #06140d;
      background: linear-gradient(135deg, var(--accent), #74f1ae);
      font-weight: 700;
      box-shadow: 0 0 0 1px rgba(32, 216, 117, 0.22), 0 8px 18px rgba(32, 216, 117, 0.18);
    }

    .header-action {
      width: auto;
      padding: 7px 11px;
      font-size: 12px;
      white-space: nowrap;
    }

    .header-action:disabled {
      cursor: not-allowed;
      opacity: .45;
    }

    .sort-wrapper { position: relative; }

    #sort-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 1100;
      display: none;
      min-width: 178px;
      padding: 4px;
      border: 1px solid var(--border);
      border-radius: var(--radius-input);
      background: rgba(14, 26, 35, 0.9);
      backdrop-filter: blur(22px) saturate(145%);
      box-shadow: var(--shadow-soft);
    }

    #sort-menu.open { display: block; }

    .sort-menu-item {
      display: block;
      width: 100%;
      padding: 8px 10px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      text-align: left;
      font-size: 12px;
    }

    .sort-menu-item:hover { background: var(--bg-hover); }

    .btn-icon {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px;
      border-radius: var(--radius-button);
      font-size: 18px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition-ui), border-color var(--transition-ui), color var(--transition-ui), transform var(--transition-ui);
    }

    .btn-icon:hover {
      background: var(--bg-hover);
      border-color: var(--border-soft);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    /* ── Main Layout ── */
    #app-layout {
      position: fixed;
      top: var(--topbar-height);
      left: 0;
      right: 0;
      bottom: var(--control-height);
      display: flex;
    }

    #left-panel, #right-panel {
      transition: width .18s ease, opacity .15s ease, padding .18s ease;
    }

    .panel-resizer {
      position: relative;
      z-index: 10;
      flex: 0 0 6px;
      cursor: col-resize;
      background: transparent;
    }

    .panel-resizer::after {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 2px;
      width: 2px;
      background: transparent;
      content: '';
      transition: background .15s;
    }

    .panel-resizer:hover::after, body.is-resizing .panel-resizer::after { background: var(--accent); }
    body.is-resizing { cursor: col-resize; }
    body.is-resizing * { cursor: col-resize !important; user-select: none !important; }

    #app-layout.left-collapsed #left-panel {
      width: 40px;
      padding: 6px 4px;
      border-right-width: 1px;
      opacity: 1;
      overflow: hidden;
      pointer-events: auto;
    }

    #app-layout.right-collapsed #right-panel {
      width: 40px;
      border-left-width: 1px;
      opacity: 1;
      overflow: hidden;
      pointer-events: auto;
    }

    #app-layout.left-collapsed .sidebar-header {
      justify-content: center;
      padding: 0;
    }

    #app-layout.left-collapsed .sidebar-title,
    #app-layout.left-collapsed .sidebar-count,
    #app-layout.left-collapsed .playlist-grid {
      display: none;
    }

    #app-layout.right-collapsed #room-section {
      width: 40px;
      height: 40px;
      flex-basis: 40px;
      padding: 4px;
      border-bottom: 0;
    }

    #app-layout.right-collapsed .room-title-row {
      justify-content: center;
    }

    #app-layout.right-collapsed .room-title-row > div:first-child,
    #app-layout.right-collapsed #room-entry,
    #app-layout.right-collapsed .room-actions,
    #app-layout.right-collapsed #members-section {
      display: none;
    }

    /* ── Left Panel ── */
    #left-panel {
      width: var(--panel-left-width);
      background: var(--glass-panel);
      backdrop-filter: blur(24px) saturate(145%);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 14px 12px;
      overflow-y: auto;
    }

    .nav-section {
      margin-bottom: 16px;
    }

    .nav-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      padding: 0 16px;
      margin-bottom: 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }

    .nav-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .nav-item.active {
      color: var(--text-primary);
      border-left: 3px solid var(--accent);
      padding-left: 13px;
    }

    .nav-item .icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    .playlist-create {
      margin-top: auto;
      padding: 12px 16px;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px 12px;
    }

    .sidebar-header-actions,
    .room-header-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .sidebar-title {
      font-size: 13px;
      font-weight: 700;
    }

    .sidebar-count {
      color: var(--text-muted);
      font-size: 11px;
    }

    .playlist-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .playlist-card {
      min-width: 0;
      padding: 7px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-playlist);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.095), rgba(255, 255, 255, 0.035));
      backdrop-filter: blur(16px) saturate(145%);
      color: var(--text-primary);
      cursor: pointer;
      text-align: left;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.16);
      transition: background var(--transition-ui), border-color var(--transition-ui), box-shadow var(--transition-ui), transform var(--transition-ui);
    }

    .playlist-card:hover {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.05));
      border-color: rgba(255, 255, 255, 0.16);
      transform: translateY(-2px);
    }

    .playlist-card.active {
      border-color: rgba(32, 216, 117, 0.55);
      box-shadow: 0 0 0 1px rgba(32, 216, 117, 0.24), 0 10px 26px rgba(32, 216, 117, 0.11);
    }

    .playlist-cover {
      display: flex;
      width: 100%;
      aspect-ratio: 1;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      color: rgba(255, 255, 255, 0.9);
      background:
        linear-gradient(145deg, rgba(58, 111, 170, 0.85), rgba(20, 43, 68, 0.86));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25), inset 0 -22px 38px rgba(0, 0, 0, 0.18);
    }

    .playlist-cover .hero-icon {
      width: 30px;
      height: 30px;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.28));
    }

    .playlist-card:nth-child(2) .playlist-cover { background: linear-gradient(145deg, rgba(126, 88, 167, 0.82), rgba(39, 31, 62, 0.9)); }
    .playlist-card:nth-child(3) .playlist-cover { background: linear-gradient(145deg, rgba(35, 151, 120, 0.72), rgba(18, 55, 49, 0.9)); }
    .playlist-card:nth-child(4) .playlist-cover { background: linear-gradient(145deg, rgba(62, 113, 185, 0.78), rgba(31, 40, 65, 0.92)); }

    .playlist-name {
      display: block;
      margin-top: 6px;
      overflow: hidden;
      font-size: 11px;
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--glass-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 14px;
      border-radius: var(--radius-button);
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(14px) saturate(140%);
      transition: background var(--transition-ui), border-color var(--transition-ui), color var(--transition-ui), transform var(--transition-ui), box-shadow var(--transition-ui);
      width: 100%;
    }

    .btn:hover {
      background: var(--glass-card-hover);
      border-color: rgba(255, 255, 255, 0.16);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #7bf1b2);
      border-color: rgba(32, 216, 117, 0.68);
      color: #04120a;
      font-weight: 600;
      box-shadow: 0 8px 22px rgba(32, 216, 117, 0.2);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--accent-hover), #8ff8bf);
    }

    .btn-danger {
      background: rgba(255, 100, 117, 0.12);
      border-color: rgba(255, 100, 117, 0.34);
      color: #ff9ca7;
    }

    /* ── Center Panel ── */
    #center-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(5, 12, 17, 0.28);
      min-width: 0;
    }

    #center-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      gap: 4px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px) saturate(140%);
    }

    #center-tabs .sort-wrapper {
      display: flex;
      align-items: center;
      margin-left: auto;
    }

    .tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      border: 1px solid transparent;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      border-radius: 10px 10px 0 0;
      transition: color var(--transition-ui), background var(--transition-ui), border-color var(--transition-ui);
      background: none;
    }

    .tab:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.055);
    }

    .tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent);
      background: rgba(32, 216, 117, 0.09);
      box-shadow: inset 0 -1px 0 rgba(32, 216, 117, 0.5);
    }

    #center-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .panel-title {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 700;
    }

    .track-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .track-item {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 78px;
      padding: 10px 12px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.04));
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-track);
      backdrop-filter: blur(18px) saturate(145%);
      cursor: pointer;
      box-shadow: var(--shadow-card);
      transition: background var(--transition-ui), border-color var(--transition-ui), box-shadow var(--transition-ui), transform var(--transition-ui);
      position: relative;
      overflow: hidden;
    }

    .track-item::before {
      position: absolute;
      top: 10px;
      bottom: 10px;
      left: 0;
      width: 3px;
      border-radius: 0 999px 999px 0;
      background: transparent;
      content: '';
      transition: background var(--transition-ui), box-shadow var(--transition-ui);
    }

    .track-item:hover {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.055));
      border-color: rgba(255, 255, 255, 0.16);
      transform: translateY(-1px);
    }

    .track-item.is-playing::before {
      background: var(--accent);
      box-shadow: 0 0 16px rgba(32, 216, 117, 0.56);
    }

    .track-item.dragging {
      opacity: 0.5;
    }

    .track-item.drag-over {
      border: 2px dashed var(--accent);
    }

    .track-thumb {
      width: 58px;
      height: 58px;
      border-radius: 10px;
      background: var(--bg-tertiary);
      object-fit: cover;
      flex-shrink: 0;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
    }

    .track-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .track-title {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.96);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-meta {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-service {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 999px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .track-added-by {
      font-size: 12px;
      color: var(--text-secondary);
      flex-shrink: 0;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .track-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .track-actions button {
      display: inline-flex;
      width: 30px;
      height: 30px;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      border-radius: var(--radius-button);
      font-size: 14px;
      line-height: 1;
      transition: background var(--transition-ui), border-color var(--transition-ui), color var(--transition-ui), transform var(--transition-ui);
    }

    .track-actions button:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
      border-color: var(--border-soft);
      transform: translateY(-1px);
    }

    .track-actions .track-delete {
      border-color: var(--border);
    }

    .track-actions .track-delete:hover {
      border-color: var(--danger);
      background: rgba(226, 33, 52, .14);
      color: #ff8c98;
    }

    .track-favorite {
      display: inline-flex;
      width: 30px;
      height: 30px;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      color: var(--text-muted);
      font-size: 20px;
      border-radius: var(--radius-button);
      transition: background var(--transition-ui), color var(--transition-ui), transform var(--transition-ui);
    }

    .track-favorite.is-favorite {
      color: var(--accent);
    }

    .track-favorite:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--accent-hover);
      transform: translateY(-1px);
    }

    .center-view { height: 100%; }

    #playlist-center-panel {
      display: none;
      height: 100%;
    }

    .playlist-hero {
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 112px;
      margin-bottom: 18px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-playlist);
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.035));
      backdrop-filter: blur(20px) saturate(145%);
      box-shadow: var(--shadow-card);
    }

    .playlist-hero-cover {
      display: flex;
      width: 78px;
      height: 78px;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: linear-gradient(140deg, rgba(58, 111, 170, 0.86), rgba(20, 43, 68, 0.88));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25), 0 14px 30px rgba(0, 0, 0, 0.22);
      color: rgba(255, 255, 255, 0.92);
    }

    .playlist-hero-cover .hero-icon {
      width: 36px;
      height: 36px;
    }

    .playlist-hero-label { color: var(--text-secondary); font-size: 11px; }
    .playlist-hero-title { margin-top: 4px; font-size: 20px; font-weight: 750; }
    .playlist-hero-description { margin-top: 5px; color: var(--text-secondary); font-size: 12px; }

    .search-box {
      width: 100%;
      padding: 9px 11px;
      border: 1px solid var(--border);
      border-radius: var(--radius-input);
      outline: none;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16px) saturate(140%);
      color: var(--text-primary);
      font: inherit;
      font-size: 13px;
    }

    .search-box:focus {
      border-color: rgba(32, 216, 117, 0.64);
      box-shadow: 0 0 0 3px rgba(32, 216, 117, 0.12);
    }

    .audio-search-form {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .audio-search-form .search-box {
      flex: 1;
    }

    .audio-search-submit {
      width: auto;
      min-width: 96px;
      flex-shrink: 0;
    }

    .audio-only-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-secondary);
    }

    .audio-only-toolbar .btn {
      width: auto;
      padding: 6px 10px;
      font-size: 12px;
    }

    .audio-only-status {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      color: var(--text-secondary);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .audio-only-volume-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      font-size: 12px;
    }

    #audio-only-volume {
      width: 92px;
      accent-color: var(--accent);
    }

    .audio-search-item {
      cursor: default;
    }

    .audio-search-play {
      color: var(--accent) !important;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 16px;
      font-size: 13px;
    }

    /* ── Right Panel ── */
    #right-panel {
      width: var(--panel-right-width);
      background: var(--glass-panel);
      backdrop-filter: blur(24px) saturate(145%);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    #room-section {
      flex: 0 0 var(--room-section-height);
      height: var(--room-section-height);
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .room-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .room-eyebrow {
      margin-bottom: 2px;
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
    }

    .room-name {
      max-width: 190px;
      overflow: hidden;
      font-size: 16px;
      line-height: 1.3;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .room-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .room-entry-tabs {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .room-entry-tabs .btn {
      width: auto;
      flex: 1;
      padding: 5px 7px;
      font-size: 11px;
    }

    .room-entry-tabs .btn.active {
      border-color: rgba(32, 216, 117, 0.58);
      color: var(--text-primary);
      background: rgba(32, 216, 117, 0.12);
    }

    .room-entry-form {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    .room-entry-form input,
    .room-entry-form select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-input);
      outline: none;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text-primary);
      font: inherit;
      font-size: 11px;
    }

    .room-entry-form select {
      color-scheme: dark;
      transition: border-color var(--transition-ui), box-shadow var(--transition-ui);
    }

    .room-entry-form input:focus,
    .room-entry-form select:focus {
      border-color: rgba(32, 216, 117, 0.64);
      box-shadow: 0 0 0 3px rgba(32, 216, 117, 0.12);
    }

    .room-entry-form select:hover {
      border-color: rgba(32, 216, 117, 0.42);
      box-shadow: 0 0 0 2px rgba(32, 216, 117, 0.08);
    }

    .room-entry-form select option {
      background: #0e1a23;
      color: var(--text-primary);
    }

    .room-entry-form select option:hover,
    .room-entry-form select option:checked {
      background: #1f6fd6;
      color: #ffffff;
    }

    .room-entry-form .btn {
      padding: 6px 8px;
      font-size: 11px;
    }

    .room-actions .btn {
      width: auto;
      min-width: 0;
      padding: 6px 8px;
      font-size: 11px;
    }

    .room-id-copy {
      flex: 1;
      justify-content: space-between;
      border-radius: var(--radius-input);
      background: rgba(255, 255, 255, 0.075);
      font-family: 'SFMono-Regular', Consolas, monospace;
    }

    .room-id-copy > span:first-child,
    .members-header > span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    #sidebar-room-id {
      overflow: hidden;
      color: var(--text-secondary);
      font-family: 'SFMono-Regular', Consolas, monospace;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .room-leave {
      color: #ff8591;
      border-color: rgba(255, 100, 117, 0.22);
    }

    .room-leave:hover {
      background: rgba(226, 33, 52, .16);
      color: #ff9fa8;
    }

    #members-section {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      height: var(--members-panel-height);
      flex: 0 0 var(--members-panel-height);
      overflow-y: auto;
    }

    .members-header {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .member-group {
      margin-bottom: 10px;
    }

    .member-group-label {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .member-group-label::before {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--text-muted);
      content: '';
    }

    .member-group-label.online::before {
      background: var(--accent);
      box-shadow: 0 0 10px rgba(32, 216, 117, 0.62);
    }

    .member-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 6px;
      font-size: 13px;
      border-radius: 8px;
    }

    .member-item:hover {
      background: rgba(255, 255, 255, 0.055);
    }

    .member-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .member-status.online {
      background: var(--accent);
      box-shadow: 0 0 10px rgba(32, 216, 117, 0.7);
    }
    .member-status.offline { background: var(--text-muted); }

    .member-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .member-badge {
      font-size: 10px;
      padding: 2px 6px;
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-secondary);
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    .member-badge .hero-icon {
      color: var(--accent);
      width: 12px;
      height: 12px;
    }

    #player-container {
      flex: 1;
      min-height: 0;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-track);
      background: rgba(0, 0, 0, 0.45);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 14px 36px rgba(0, 0, 0, 0.24);
      overflow: hidden;
    }

    #youtube-player, #youtube-player iframe, #html-video-player {
      width: 100%;
      height: 100%;
      border: 0;
      text-align: center;
    }

    #youtube-player {
      padding: 16px;
    }

    #html-video-player {
      display: none;
      object-fit: contain;
      background: #000;
    }

    /* ── Bottom Control ── */
    #bottom-control {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--control-height);
      background: rgba(8, 18, 25, 0.76);
      backdrop-filter: blur(26px) saturate(150%);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      z-index: 100;
    }

    #now-playing {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 240px;
      flex-shrink: 0;
    }

    #now-playing-thumb {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: var(--bg-tertiary);
      object-fit: cover;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
    }

    #now-playing-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #now-playing-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #now-playing-artist {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #playback-controls {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    #control-buttons {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .control-btn {
      width: 34px;
      height: 34px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0;
      border-radius: 50%;
      transition: background var(--transition-ui), border-color var(--transition-ui), color var(--transition-ui), transform var(--transition-ui);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .control-btn:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--border-soft);
      transform: translateY(-1px);
    }

    .control-btn.play {
      width: 42px;
      height: 42px;
      color: #04120a;
      background: linear-gradient(135deg, var(--accent), #8ff8bf);
      border-color: rgba(32, 216, 117, 0.7);
      box-shadow: 0 12px 28px rgba(32, 216, 117, 0.28);
    }

    .control-btn:active {
      transform: scale(0.92);
    }

    #seek-bar-container {
      width: 100%;
      max-width: 500px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .time-label {
      font-size: 11px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      min-width: 36px;
      text-align: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: pointer;
      flex: 1;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      transition: background var(--transition-ui);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      background: rgba(255, 255, 255, 0.88);
      border-radius: 50%;
      margin-top: -4px;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.08);
      transition: background var(--transition-ui), box-shadow var(--transition-ui), transform var(--transition-ui);
    }

    input[type="range"]:hover::-webkit-slider-runnable-track {
      background: rgba(255, 255, 255, 0.24);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(32, 216, 117, 0.16);
      transform: scale(1.08);
    }

    #volume-section {
      width: 140px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #volume-slider {
      flex: 1;
      min-width: 0;
      width: 100%;
    }

    /* ── Context Menu ── */
    #context-menu {
      position: fixed;
      background: rgba(14, 26, 35, 0.92);
      backdrop-filter: blur(22px) saturate(145%);
      border: 1px solid var(--border);
      border-radius: var(--radius-input);
      padding: 4px;
      min-width: 160px;
      z-index: 1000;
      display: none;
      box-shadow: var(--shadow-soft);
    }

    .context-menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
      border-radius: 8px;
      transition: background var(--transition-ui), color var(--transition-ui);
    }

    .context-menu-item:hover {
      background: var(--bg-hover);
    }

    .context-menu-item.danger {
      color: var(--danger);
    }

    .context-menu-separator {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    /* ── Modal ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    #modal-overlay.active {
      display: flex;
    }

    .modal {
      background: rgba(14, 26, 35, 0.88);
      backdrop-filter: blur(28px) saturate(150%);
      border-radius: var(--radius-track);
      border: 1px solid var(--border);
      width: 420px;
      max-width: 90vw;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 16px;
      font-weight: 700;
    }

    .modal-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .form-group input,
    .form-group select {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 10px;
      border-radius: var(--radius-input);
      font-size: 13px;
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: rgba(32, 216, 117, 0.64);
      box-shadow: 0 0 0 3px rgba(32, 216, 117, 0.12);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 0 20px 20px;
    }

    .modal-actions .btn {
      width: auto;
    }

    /* ── Add Track Search ── */
    .track-add-modal {
      width: min(980px, 92vw);
      max-height: min(820px, 90vh);
      display: flex;
      flex-direction: column;
    }

    .track-add-modal .modal-body {
      overflow: auto;
    }

    .track-add-mode-switch {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      padding: 4px;
      border: 1px solid var(--border);
      border-radius: var(--radius-input);
      background: rgba(255, 255, 255, 0.055);
    }

    .track-add-mode-button {
      flex: 1;
      min-height: 34px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--text-secondary);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .track-add-mode-button.active {
      background: var(--accent);
      color: #04120a;
    }

    .track-add-mode-panel[hidden] {
      display: none;
    }

    .track-search-row {
      display: flex;
      gap: 8px;
    }

    .track-search-row input {
      min-width: 0;
      flex: 1;
    }

    .track-search-button {
      width: 38px;
      flex: 0 0 38px;
      padding: 0;
      font-size: 16px;
    }

    #track-candidates,
    .track-candidates {
      display: none;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .track-candidate-group {
      min-width: 0;
    }

    .track-candidate-group-title {
      margin: 0 0 8px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
    }

    .track-candidate-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .track-candidate {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px;
      border: 1px solid var(--border);
      border-radius: var(--radius-track);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.04));
      backdrop-filter: blur(16px) saturate(145%);
      color: var(--text-primary);
      text-align: left;
      cursor: pointer;
      transition: background var(--transition-ui), border-color var(--transition-ui), box-shadow var(--transition-ui), transform var(--transition-ui);
    }

    .track-candidate:hover:not(:disabled) {
      background: var(--bg-hover);
      transform: translateY(-1px);
    }

    .track-candidate.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(32, 216, 117, 0.58), 0 0 20px rgba(32, 216, 117, 0.12);
    }

    .track-candidate:disabled {
      cursor: default;
      opacity: .6;
    }

    .track-candidate-thumb {
      width: 52px;
      height: 52px;
      flex: 0 0 52px;
      border-radius: 10px;
      object-fit: cover;
      background: #333;
    }

    .track-candidate-thumb.is-placeholder {
      background: linear-gradient(135deg, #20343a, #2f2738);
    }

    .track-candidate-copy {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .track-candidate-title,
    .track-candidate-meta {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .track-candidate-title {
      font-size: 13px;
      font-weight: 600;
    }

    .track-candidate-meta {
      margin-top: 4px;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .track-candidate-error {
      margin: 0;
      padding: 12px;
      border: 1px dashed var(--border);
      border-radius: var(--radius-input);
      color: var(--text-secondary);
      font-size: 12px;
    }

    .track-candidate-progress {
      position: relative;
      overflow: hidden;
      margin: 0;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-input);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px) saturate(140%);
      color: var(--text-secondary);
      font-size: 12px;
    }

    .track-candidate-progress::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: track-progress-slide 1.15s ease-in-out infinite;
    }

    @keyframes track-progress-slide {
      from { transform: translateX(-100%); }
      to { transform: translateX(100%); }
    }

    @media (max-width: 640px) {
      #track-candidates,
      .track-candidates { grid-template-columns: 1fr; }
    }

    .mode-options {
      display: flex;
      gap: 10px;
    }

    .mode-option {
      flex: 1;
      padding: 12px;
      background: var(--bg-tertiary);
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s;
    }

    .mode-option:hover {
      border-color: var(--border);
    }

    .mode-option.selected {
      border-color: var(--accent);
    }

    .mode-option .mode-icon {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .mode-option .mode-label {
      font-size: 13px;
      font-weight: 600;
    }

    .mode-option .mode-desc {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ── Toast ── */
    #toast-container {
      position: fixed;
      bottom: calc(var(--control-height) + 12px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 3000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: rgba(14, 26, 35, 0.9);
      backdrop-filter: blur(20px) saturate(145%);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px 16px;
      border-radius: var(--radius-input);
      font-size: 13px;
      box-shadow: var(--shadow-soft);
      animation: toastIn 0.2s ease;
      pointer-events: auto;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }
  </style>
</head>

  <!-- Top Bar -->
  <header id="top-bar">
    <div class="brand"><span data-hero-icon="musical-note"></span><span>MusicShare</span></div>
    <div class="workspace-controls" aria-label="表示する楽曲一覧">
      <div class="workspace-switch" role="group" aria-label="楽曲一覧の切替">
        <button class="workspace-tab" data-workspace="playlist" type="button">プレイリスト</button>
        <button class="workspace-tab active" data-workspace="queue" type="button">共有楽曲キュー</button>
      </div>
      <button class="btn btn-primary header-action" id="btn-header-add-track" type="button"><span data-hero-icon="plus"></span><span>追加</span></button>
    </div>
    <div class="top-actions">
    </div>
  </header>

  <!-- Main Layout -->
  <div id="app-layout">
    <!-- Left Panel: Playlists -->
    <aside id="left-panel">
      <div class="sidebar-header">
        <span class="sidebar-title">プレイリスト</span>
        <div class="sidebar-header-actions">
          <span class="sidebar-count">4件</span>
          <button class="btn-icon sidebar-toggle" id="btn-toggle-left-sidebar" type="button" title="左サイドバーを閉じる" aria-label="左サイドバーを閉じる" aria-expanded="true"><span data-hero-icon="chevron-left"></span></button>
        </div>
      </div>
      <div class="playlist-grid" id="playlist-grid">
        <button class="playlist-card active" data-playlist="favorites" data-playlist-name="お気に入り" type="button">
          <span class="playlist-cover" data-playlist-icon="heart-solid"><span data-hero-icon="heart-solid"></span></span><span class="playlist-name">お気に入り</span>
        </button>
        <button class="playlist-card" data-playlist="work" data-playlist-name="作業用BGM" type="button">
          <span class="playlist-cover" data-playlist-icon="musical-note"><span data-hero-icon="musical-note"></span></span><span class="playlist-name">作業用BGM</span>
        </button>
        <button class="playlist-card" data-playlist="drive" data-playlist-name="ドライブ用" type="button">
          <span class="playlist-cover" data-playlist-icon="queue-list"><span data-hero-icon="queue-list"></span></span><span class="playlist-name">ドライブ用</span>
        </button>
        <button class="playlist-card" data-playlist="recent" data-playlist-name="最近追加した曲" type="button">
          <span class="playlist-cover" data-playlist-icon="clock"><span data-hero-icon="clock"></span></span><span class="playlist-name">最近追加した曲</span>
        </button>
      </div>
    </aside>
    <div class="panel-resizer" id="left-panel-resizer" role="separator" aria-orientation="vertical" aria-label="左サイドパネルの幅を調整"></div>

    <!-- Center Panel: Queue / History -->
    <main id="center-panel">
      <div id="center-content">
        <div id="playlist-center-panel" class="center-view">
          <div class="playlist-hero">
            <div class="playlist-hero-cover" id="playlist-hero-cover" data-playlist-icon="heart-solid"><span data-hero-icon="heart-solid"></span></div>
            <div>
              <div class="playlist-hero-label">プレイリスト</div>
              <div class="playlist-hero-title" id="playlist-center-title">お気に入り</div>
              <div class="playlist-hero-description">プレイリスト機能は今後のフェーズで楽曲管理に対応します。</div>
            </div>
          </div>
          <div class="track-list" id="favorite-playlist-list"></div>
        </div>
        <div id="shared-center-panel" class="center-view">
          <div id="center-tabs">
            <button class="tab active" data-tab="queue" type="button"><span data-hero-icon="queue-list"></span> 共有キュー</button>
            <button class="tab" data-tab="history" type="button"><span data-hero-icon="clock"></span> 履歴</button>
            <button class="tab" data-tab="search" type="button"><span data-hero-icon="magnifying-glass"></span> 検索</button>
            <div class="sort-wrapper">
              <button class="btn header-action" id="btn-sort" type="button" aria-expanded="false"><span data-hero-icon="bars-arrow-down"></span><span>ソート</span></button>
              <div id="sort-menu" role="menu" aria-label="共有キューをソート">
                <button class="sort-menu-item" data-sort="title-asc" type="button">曲名（A → Z）</button>
                <button class="sort-menu-item" data-sort="title-desc" type="button">曲名（Z → A）</button>
                <button class="sort-menu-item" data-sort="duration-asc" type="button">曲の長さ（短い順）</button>
                <button class="sort-menu-item" data-sort="duration-desc" type="button">曲の長さ（長い順）</button>
                <button class="sort-menu-item" data-sort="member-round-robin" type="button">メンバーごとに1曲ずつ</button>
              </div>
            </div>
          </div>
          <div id="queue-panel" class="tab-panel">
          <div id="spotify-auth-banner" style="display:none;margin-bottom:12px;padding:12px 16px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;align-items:center;justify-content:space-between;gap:12px;">
            <div style="display:flex;align-items:center;gap:10px;">
              <span data-hero-icon="musical-note"></span>
              <div style="display:flex;flex-direction:column;gap:2px;">
                <span id="spotify-auth-label" style="font-size:13px;font-weight:600;color:var(--text-primary);">Spotify にログインしてください</span>
                <span id="spotify-auth-status" style="font-size:11px;color:var(--text-secondary);">未認証</span>
              </div>
            </div>
            <button class="btn btn-primary" id="btn-spotify-login" style="width:auto;padding:6px 16px;font-size:12px;">Spotify にログイン</button>
          </div>
          <div class="panel-header">
            <span class="panel-title"><span data-hero-icon="queue-list"></span> 再生待ちのキュー (<span id="queue-count">0</span>曲)</span>
          </div>
          <div class="track-list" id="queue-list"></div>
        </div>
          <div id="history-panel" class="tab-panel" style="display:none;">
            <div class="panel-header">
              <span class="panel-title"><span data-hero-icon="clock"></span> 再生履歴</span>
            </div>
            <div class="track-list" id="history-list"></div>
          </div>
          <div id="search-panel" class="tab-panel" style="display:none;">
            <div class="panel-header"><span class="panel-title"><span data-hero-icon="magnifying-glass"></span> Audio-only 音源を検索</span></div>
            <form class="audio-search-form" id="audio-search-form">
              <input class="search-box" id="search-query" type="search" placeholder="許可済み音源を検索" />
              <button class="btn btn-primary audio-search-submit" type="submit">検索</button>
            </form>
            <div class="audio-only-toolbar" aria-label="Audio-only プレイヤー操作">
              <span class="audio-only-status" id="audio-search-status">待機中</span>
              <button class="btn" id="btn-audio-only-pause" type="button">一時停止</button>
              <button class="btn" id="btn-audio-only-resume" type="button">再開</button>
              <button class="btn" id="btn-audio-only-stop" type="button">停止</button>
              <label class="audio-only-volume-wrap">
                音量
                <input id="audio-only-volume" type="range" min="0" max="1" step="0.01" value="1" />
              </label>
            </div>
            <div class="track-list" id="audio-search-results">
              <div class="empty-state">検索すると許可済みAudio-only音源がここに表示されます</div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div class="panel-resizer" id="right-panel-resizer" role="separator" aria-orientation="vertical" aria-label="右サイドパネルの幅を調整"></div>

    <!-- Right Panel: Members + Player -->
    <aside id="right-panel">
      <section id="room-section" aria-label="ルーム情報">
        <div class="room-title-row">
          <div>
            <div class="room-eyebrow">ROOM</div>
            <div class="room-name" id="sidebar-room-name">ルーム</div>
          </div>
          <div class="room-header-actions">
            <button class="btn-icon sidebar-toggle" id="btn-toggle-right-sidebar" type="button" title="右サイドバーを閉じる" aria-label="右サイドバーを閉じる" aria-expanded="true"><span data-hero-icon="chevron-right"></span></button>
          </div>
        </div>
        <div id="room-entry">
          <div class="room-entry-tabs" role="group" aria-label="ルーム操作">
            <button class="btn active" id="btn-room-create-mode" type="button">作成</button>
            <button class="btn" id="btn-room-join-mode" type="button">参加</button>
          </div>
          <form class="room-entry-form" id="room-create-form-sidebar">
            <input id="input-sidebar-room-name" type="text" placeholder="ルーム名" value="Music Room" />
            <input id="input-sidebar-user-name-create" type="text" placeholder="あなたの名前" />
            <select id="select-sidebar-player-type" aria-label="再生プレイヤー">
              <option value="youtube">YouTube プレイヤー</option>
              <option value="html-video" selected>videoタグで再生</option>
            </select>
            <button class="btn btn-primary" type="submit">ルームを作成</button>
          </form>
          <form class="room-entry-form" id="room-join-form-sidebar" style="display:none;">
            <input id="input-sidebar-room-id" type="text" placeholder="ルームID" maxlength="6" />
            <input id="input-sidebar-user-name-join" type="text" placeholder="あなたの名前" />
            <button class="btn btn-primary" type="submit">ルームに参加</button>
          </form>
        </div>
        <div class="room-actions" id="room-details" style="display:none;">
          <button class="btn room-id-copy" id="btn-copy-room-id" type="button" disabled>
            <span><span data-hero-icon="document-duplicate"></span> IDをコピー</span><span id="sidebar-room-id">------</span>
          </button>
          <button class="btn room-leave" id="btn-leave-room" type="button" disabled><span data-hero-icon="arrow-right-on-rectangle"></span><span>退出</span></button>
        </div>
      </section>
      <div id="members-section">
        <div class="members-header">
          <span><span data-hero-icon="user-group"></span> メンバー (<span id="member-count">0</span>)</span>
        </div>
        <div id="members-list"></div>
      </div>
      <div id="player-container"><div id="youtube-player"></div></div>
    </aside>
  </div>

  <!-- Bottom Control -->
  <footer id="bottom-control">
    <div id="now-playing">
      <img id="now-playing-thumb" src="" alt="" style="display:none;" />
      <div id="now-playing-info">
        <div id="now-playing-title">未再生</div>
        <div id="now-playing-artist">-</div>
      </div>
    </div>
    <div id="playback-controls">
      <div id="control-buttons">
        <button class="control-btn" id="btn-prev" title="Previous" aria-label="前へ"><span data-hero-icon="backward"></span></button>
        <button class="control-btn play" id="btn-play-pause" title="Play/Pause" aria-label="再生"><span data-hero-icon="play-solid"></span></button>
        <button class="control-btn" id="btn-next" title="Next" aria-label="次へ"><span data-hero-icon="forward"></span></button>
      </div>
      <div id="seek-bar-container">
        <span class="time-label" id="time-current">0:00</span>
        <input type="range" id="seek-bar" min="0" max="100" value="0" />
        <span class="time-label" id="time-total">0:00</span>
      </div>
    </div>
    <div id="volume-section">
      <button class="btn-icon" id="btn-mute" title="ミュート" aria-label="ミュート"><span data-hero-icon="speaker-wave"></span></button>
      <input type="range" id="volume-slider" min="0" max="100" value="80" />
    </div>
  </footer>

  <!-- Custom Context Menu -->
  <div id="context-menu"></div>

  <!-- Add Track Modal (inline) -->
  <div id="modal-overlay-track" style="position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:2000;display:none;align-items:center;justify-content:center;">
    <div class="modal track-add-modal">
      <div class="modal-header"><span data-hero-icon="plus"></span> 曲を追加</div>
      <div class="modal-body">
        <div class="track-add-mode-panel" id="track-add-url-panel">
          <div class="form-group">
            <label>URL</label>
            <input type="text" id="input-track-url" placeholder="YouTube または Spotify のURL" />
          </div>
          <div class="form-group">
            <label for="input-track-search-query">検索コマンド</label>
            <div class="track-search-row">
              <input type="text" id="input-track-search-query" placeholder="URL解析後に検索語が入ります" />
              <button class="btn track-search-button" id="btn-track-search" type="button" title="編集した検索コマンドで再検索" aria-label="編集した検索コマンドで再検索"><span data-hero-icon="magnifying-glass"></span></button>
            </div>
          </div>
          <div id="track-candidates" class="track-candidates">
            <section class="track-candidate-group" aria-labelledby="youtube-candidates-title">
              <h3 class="track-candidate-group-title" id="youtube-candidates-title">YouTube</h3>
              <div class="track-candidate-list" id="track-candidate-youtube"></div>
            </section>
            <section class="track-candidate-group" id="youtube-music-candidates-group" aria-labelledby="youtube-music-candidates-title">
              <h3 class="track-candidate-group-title" id="youtube-music-candidates-title">YouTube Music</h3>
              <div class="track-candidate-list" id="track-candidate-youtube-music"></div>
            </section>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn" id="btn-track-cancel">キャンセル</button>
        <button class="btn" id="btn-track-add-playlist" disabled>プレイリストに追加</button>
        <button class="btn btn-primary" id="btn-track-resolve">URLを解析</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script src="renderer.js"></script>
</body>
</html>
